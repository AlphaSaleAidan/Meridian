# Postal — Self-hosted email delivery platform
# Docs: https://docs.postalserver.io/install/docker
#
# First-time setup:
#   cd services/postal
#   docker compose up -d postal-db postal-rabbitmq
#   docker compose run --rm postal postal initialize
#   docker compose run --rm postal postal make-user
#   docker compose up -d

services:
  postal:
    image: ghcr.io/postalserver/postal:latest
    container_name: meridian-postal-web
    command: postal web-server
    restart: unless-stopped
    ports:
      - "5000:8080"
    volumes:
      - ./postal.yml:/config/postal.yml:ro
      - ./signing.key:/config/signing.key:ro
    depends_on:
      postal-db:
        condition: service_healthy
      postal-rabbitmq:
        condition: service_healthy

  postal-proxy:
    image: alpine/socat:latest
    container_name: meridian-postal-proxy
    command: TCP-LISTEN:8080,fork,reuseaddr TCP:127.0.0.1:5000
    restart: unless-stopped
    network_mode: "service:postal"
    depends_on:
      - postal

  postal-smtp:
    image: ghcr.io/postalserver/postal:latest
    container_name: meridian-postal-smtp
    command: postal smtp-server
    restart: unless-stopped
    ports:
      - "25:25"
    volumes:
      - ./postal.yml:/config/postal.yml:ro
      - ./signing.key:/config/signing.key:ro
    depends_on:
      postal-db:
        condition: service_healthy
      postal-rabbitmq:
        condition: service_healthy

  postal-worker:
    image: ghcr.io/postalserver/postal:latest
    container_name: meridian-postal-worker
    command: postal worker
    restart: unless-stopped
    volumes:
      - ./postal.yml:/config/postal.yml:ro
      - ./signing.key:/config/signing.key:ro
    depends_on:
      postal-db:
        condition: service_healthy
      postal-rabbitmq:
        condition: service_healthy

  postal-db:
    image: mariadb:11
    container_name: meridian-postal-db
    restart: unless-stopped
    volumes:
      - postal-db-data:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: ${POSTAL_DB_ROOT_PASSWORD:-postal_root_pw}
      MARIADB_DATABASE: postal
      MARIADB_USER: postal
      MARIADB_PASSWORD: ${POSTAL_DB_PASSWORD:-postal_db_pw}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  postal-rabbitmq:
    image: rabbitmq:3-management
    container_name: meridian-postal-rabbitmq
    restart: unless-stopped
    volumes:
      - postal-rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: postal
      RABBITMQ_DEFAULT_PASS: ${POSTAL_RABBITMQ_PASSWORD:-postal_rmq_pw}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postal-db-data:
  postal-rabbitmq-data:
